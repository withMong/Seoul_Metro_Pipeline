# 서울 지하철 실시간 수집기 — Oracle Cloud Always Free VM 배포용
# =====================================================================
# 여기엔 '수집기'만 둔다: Kafka(단일 노드 KRaft, 7일 보관) + producer.
# 분석 스택(Flink/Spark/Iceberg/StarRocks)은 로컬 PC 에서 별도 실행하고,
# VM 의 Kafka 에 7일간 쌓인 데이터를 회수(export/replay)해 배치로 돌린다.
#   → 수집=상시(클라우드) / 분석=배치(로컬). Kafka 가 둘을 잇는 재생 가능한 버퍼.
# =====================================================================
name: subway-collector

services:
  kafka:
    image: apache/kafka:3.9.1
    hostname: kafka
    container_name: subway-kafka
    restart: unless-stopped
    extra_hosts:
      - "kafka:127.0.0.1"
    ports:
      # VM 의 loopback 에만 바인딩 → 외부에 Kafka 를 공개하지 않는다(보안).
      # 로컬 회수는 SSH 터널 또는 아래 export-topic.sh 사용.
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3               # 자동 생성 토픽도 3파티션
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168        # ★ 7일 보관 (PC 꺼져 있어도 안전)
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 25s

  producer:
    build:
      context: ../../docker/producer
      dockerfile: Dockerfile.subway
      args:
        CONFLUENT_KAFKA_VERSION: ${CONFLUENT_KAFKA_VERSION:-2.14.0}
    image: de5-subway-producer:python3.12
    container_name: subway-producer
    restart: "no"                          # cron 이 창마다 start/stop
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["python", "/workspace/labs/03-kafka-producer/subway_producer.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:19092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-subway-events}
      KAFKA_KEY_FIELD: train_no
      SEOUL_API_KEY: ${SEOUL_API_KEY:?SEOUL_API_KEY is required}
      SUBWAY_LINES: ${SUBWAY_LINES:-1호선,2호선,9호선}
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
    volumes:
      - ../../labs:/workspace/labs

volumes:
  kafka-data:
